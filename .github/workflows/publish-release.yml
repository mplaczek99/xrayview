name: Publish release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-package:
    name: Build release package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            platform: linux
            backend_output: java-frontend/target/xrayview
            artifact_name: xrayview-linux-release-asset
            asset_suffix: linux.AppImage
          - os: windows-latest
            label: Windows
            platform: windows
            backend_output: java-frontend/target/xrayview.exe
            artifact_name: xrayview-windows-release-asset
            asset_suffix: windows.zip

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Go backend
        run: go build -o "${{ matrix.backend_output }}" ./cmd/xrayview

      - name: Build Java frontend
        run: mvn -B -f java-frontend/pom.xml package

      - name: Download appimagetool
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o "$RUNNER_TEMP/appimagetool-x86_64.AppImage" \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool-x86_64.AppImage"

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: |
          asset_name="xrayview-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}"
          bash java-frontend/package-linux-appimage.sh \
            "${{ matrix.backend_output }}" \
            "$asset_name" \
            "${GITHUB_REF_NAME#v}" \
            "$RUNNER_TEMP/appimagetool-x86_64.AppImage"
          printf 'ASSET_NAME=%s\n' "$asset_name" >> "$GITHUB_ENV"

      - name: Build Windows app-image
        if: runner.os == 'Windows'
        run: bash java-frontend/package-app-image.sh "${{ matrix.backend_output }}" "${GITHUB_REF_NAME#v}"

      - name: Prepare Windows zip asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $appImagePath = Join-Path $env:GITHUB_WORKSPACE "java-frontend\target\app-image\XRayView"
          if (-not (Test-Path $appImagePath -PathType Container)) {
            throw "Expected a Windows app-image at $appImagePath"
          }

          $assetName = "xrayview-$env:GITHUB_REF_NAME-${{ matrix.asset_suffix }}"
          if (Test-Path $assetName) {
            Remove-Item $assetName -Force
          }

          Compress-Archive -Path $appImagePath -DestinationPath $assetName -CompressionLevel Optimal
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-package

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi

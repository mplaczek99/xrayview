name: Build release artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-desktop-package:
    name: Build desktop package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: xrayview-linux-appimage
            bundle: appimage
            artifact_glob: frontend/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            label: Windows
            artifact_name: xrayview-windows-msi
            bundle: msi
            artifact_glob: frontend/src-tauri/target/release/bundle/msi/*.msi

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            frontend/src-tauri -> target
            backend-rust -> target

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build desktop bundle
        run: npm run tauri:build -- --bundles "${{ matrix.bundle }}"
        working-directory: frontend

      - name: Resolve bundle artifact
        run: |
          shopt -s nullglob
          artifacts=( ${{ matrix.artifact_glob }} )
          if [ "${#artifacts[@]}" -eq 0 ]; then
            printf 'No bundle matched pattern: %s\n' "${{ matrix.artifact_glob }}" >&2
            exit 1
          fi
          printf 'ARTIFACT_PATH=%s\n' "${artifacts[0]}" >> "$GITHUB_ENV"

      - name: Upload desktop package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

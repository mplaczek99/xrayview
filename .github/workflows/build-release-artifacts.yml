name: Build release artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-desktop-package:
    name: Build desktop package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: xrayview-linux-appimage
            backend_output: java-frontend/target/xrayview
            artifact_path: java-frontend/target/release/XRayView.AppImage
          - os: windows-latest
            label: Windows
            artifact_name: xrayview-windows-app-image
            backend_output: java-frontend/target/xrayview.exe
            artifact_path: java-frontend/target/app-image/XRayView

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Go backend
        run: go build -o "${{ matrix.backend_output }}" ./cmd/xrayview

      - name: Build Java frontend
        run: mvn -B -f java-frontend/pom.xml package

      - name: Download appimagetool
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o "$RUNNER_TEMP/appimagetool-x86_64.AppImage" \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool-x86_64.AppImage"

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: bash java-frontend/package-linux-appimage.sh "${{ matrix.backend_output }}" "${{ matrix.artifact_path }}" "" "$RUNNER_TEMP/appimagetool-x86_64.AppImage"

      - name: Build Windows app-image
        if: runner.os == 'Windows'
        run: bash java-frontend/package-app-image.sh "${{ matrix.backend_output }}"

      - name: Upload desktop package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

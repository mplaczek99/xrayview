name: Publish release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-package:
    name: Build release asset (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: xrayview-linux-release-asset
          - os: windows-latest
            label: Windows
            artifact_name: xrayview-windows-release-asset

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: |
            desktop/go.sum
            backend/go.sum

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and smoke-test release archive
        if: runner.os != 'Windows'
        run: npm run release:smoke

      - name: Build Windows release archive
        if: runner.os == 'Windows'
        run: |
          npm run contracts:check
          npm run wails:build

      - name: Stage release payload
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            arch="$(uname -m)"
            stage_dir="$RUNNER_TEMP/xrayview-v${version}-linux-${arch}"
          else
            stage_dir="$RUNNER_TEMP/xrayview-v${version}-windows-x64"
          fi

          node ./desktop/scripts/stage-release-payload.mjs --output "$stage_dir"
          printf 'STAGE_DIR=%s\n' "$stage_dir" >> "$GITHUB_ENV"

      - name: Prepare Linux AppDir
        if: runner.os == 'Linux'
        run: |
          appdir="$RUNNER_TEMP/xrayview.AppDir"
          mkdir -p "$appdir/usr"
          cp -R "$STAGE_DIR/." "$appdir/usr/"
          install -Dm755 desktop/packaging/linux/AppRun "$appdir/AppRun"
          install -Dm644 desktop/packaging/linux/xrayview.desktop "$appdir/xrayview.desktop"
          install -Dm644 frontend/app-icon.png "$appdir/xrayview.png"
          chmod +x "$appdir/usr/bin/xrayview" "$appdir/usr/bin/xrayview-backend"
          printf 'APPDIR=%s\n' "$appdir" >> "$GITHUB_ENV"

      - name: Install AppImage tooling
        if: runner.os == 'Linux'
        run: |
          tool_dir="$RUNNER_TEMP/linuxdeploy"
          mkdir -p "$tool_dir"
          curl -fsSL -o "$tool_dir/linuxdeploy-x86_64.AppImage" \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o "$tool_dir/linuxdeploy-plugin-gtk.sh" \
            https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          curl -fsSL -o "$tool_dir/appimagetool-x86_64.AppImage" \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x \
            "$tool_dir/linuxdeploy-x86_64.AppImage" \
            "$tool_dir/linuxdeploy-plugin-gtk.sh" \
            "$tool_dir/appimagetool-x86_64.AppImage"
          printf 'LINUXDEPLOY_DIR=%s\n' "$tool_dir" >> "$GITHUB_ENV"

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: |
          version="${GITHUB_REF_NAME#v}"
          arch="$(uname -m)"
          asset_name="xrayview-v${version}-linux-${arch}.AppImage"
          backend_bin="$RUNNER_TEMP/xrayview-backend"
          mv "$APPDIR/usr/bin/xrayview-backend" "$backend_bin"
          (
            cd "$RUNNER_TEMP"
            "$LINUXDEPLOY_DIR/linuxdeploy-x86_64.AppImage" --appimage-extract-and-run \
              --appdir "$APPDIR" \
              --desktop-file "$APPDIR/xrayview.desktop" \
              --icon-file "$APPDIR/xrayview.png" \
              --executable "$APPDIR/usr/bin/xrayview" \
              --plugin gtk
          )
          install -Dm755 "$backend_bin" "$APPDIR/usr/bin/xrayview-backend"
          ARCH="$arch" \
            "$LINUXDEPLOY_DIR/appimagetool-x86_64.AppImage" --appimage-extract-and-run \
            "$APPDIR" "$RUNNER_TEMP/$asset_name"
          printf 'ASSET_PATH=%s\n' "$RUNNER_TEMP/$asset_name" >> "$GITHUB_ENV"

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
          }

          $wixDir = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset v*" |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if (-not $wixDir) {
            throw "WiX Toolset installation directory was not found."
          }

          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $wixDir.FullName "bin")

      - name: Build Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $wixBuildDir = Join-Path $env:RUNNER_TEMP "wix-build"
          New-Item -ItemType Directory -Force -Path $wixBuildDir | Out-Null
          Copy-Item "desktop/packaging/windows/Product.wxs" (Join-Path $wixBuildDir "Product.wxs")

          Push-Location $wixBuildDir
          & heat.exe dir $env:STAGE_DIR -cg AppFiles -dr INSTALLDIR -ag -scom -sreg -srd -var var.StageDir -out AppFiles.wxs
          & candle.exe -nologo "-dStageDir=$env:STAGE_DIR" "-dProductVersion=$version" -arch x64 Product.wxs AppFiles.wxs
          $msiPath = Join-Path $env:RUNNER_TEMP "xrayview-v$version-windows-x64.msi"
          & light.exe -nologo -out $msiPath Product.wixobj AppFiles.wixobj
          Pop-Location

          Add-Content -Path $env:GITHUB_ENV -Value "ASSET_PATH=$msiPath"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          raw_notes="$RUNNER_TEMP/release-notes.raw.md"
          notes_file="$RUNNER_TEMP/release-notes.md"

          awk -v version="$version" '
            BEGIN { target = "## [" version "] - " }
            index($0, target) == 1 { in_section = 1; next }
            in_section && index($0, "## [") == 1 { exit }
            in_section { print }
          ' CHANGELOG.md > "$raw_notes"

          sed '/./,$!d' "$raw_notes" | tac | sed '/./,$!d' | tac > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            printf 'Could not extract release notes for version %s from CHANGELOG.md\n' "$version" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

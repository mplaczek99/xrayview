name: Publish release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-package:
    name: Build release package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            bundle: appimage
            artifact_name: xrayview-linux-release-asset
            artifact_glob: frontend/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            label: Windows
            bundle: msi
            artifact_name: xrayview-windows-release-asset
            artifact_glob: frontend/src-tauri/target/release/bundle/msi/*.msi

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            frontend/src-tauri -> target
            backend -> target

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build release bundle
        run: npm run tauri:build -- --bundles "${{ matrix.bundle }}"
        working-directory: frontend

      - name: Resolve release asset
        run: |
          shopt -s nullglob
          artifacts=( ${{ matrix.artifact_glob }} )
          if [ "${#artifacts[@]}" -eq 0 ]; then
            printf 'No release asset matched pattern: %s\n' "${{ matrix.artifact_glob }}" >&2
            exit 1
          fi
          printf 'ASSET_PATH=%s\n' "${artifacts[0]}" >> "$GITHUB_ENV"

      - name: Rename Linux AppImage
        if: runner.os == 'Linux'
        run: |
          arch="$(uname -m)"
          new_name="xrayview-${GITHUB_REF_NAME}-${arch}.AppImage"
          mv "$ASSET_PATH" "$(dirname "$ASSET_PATH")/${new_name}"
          printf 'ASSET_PATH=%s\n' "$(dirname "$ASSET_PATH")/${new_name}" >> "$GITHUB_ENV"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          raw_notes="$RUNNER_TEMP/release-notes.raw.md"
          notes_file="$RUNNER_TEMP/release-notes.md"

          awk -v version="$version" '
            BEGIN { target = "## [" version "] - " }
            index($0, target) == 1 { in_section = 1; next }
            in_section && index($0, "## [") == 1 { exit }
            in_section { print }
          ' CHANGELOG.md > "$raw_notes"

          sed '/./,$!d' "$raw_notes" | tac | sed '/./,$!d' | tac > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            printf 'Could not extract release notes for version %s from CHANGELOG.md\n' "$version" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

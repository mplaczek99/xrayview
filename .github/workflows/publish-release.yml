name: Publish release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-package:
    name: Build release package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            platform: linux
            backend_output: java-frontend/target/xrayview
            artifact_name: xrayview-linux-release-asset
            asset_name: xrayview-${GITHUB_REF_NAME}-linux-app-image.tar.gz
          - os: windows-latest
            label: Windows
            platform: windows
            backend_output: java-frontend/target/xrayview.exe
            artifact_name: xrayview-windows-release-asset
            asset_name: xrayview-${GITHUB_REF_NAME}-windows-msi.msi

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixDir = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" | Select-Object -First 1
          if (-not $wixDir) {
            throw "WiX Toolset install directory was not found"
          }
          $wixBin = Join-Path $wixDir.FullName "bin"
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Go backend
        run: go build -o "${{ matrix.backend_output }}" ./cmd/xrayview

      - name: Build Java frontend
        run: mvn -B -f java-frontend/pom.xml package

      - name: Build app-image
        if: runner.os == 'Linux'
        run: bash java-frontend/package-app-image.sh "${{ matrix.backend_output }}"

      - name: Build Windows MSI
        if: runner.os == 'Windows'
        run: bash java-frontend/package-windows-msi.sh "${{ matrix.backend_output }}" "${GITHUB_REF_NAME#v}"

      - name: Archive Linux app-image
        if: runner.os == 'Linux'
        run: |
          asset_name="${{ matrix.asset_name }}"
          tar -czf "$asset_name" -C java-frontend/target/app-image XRayView
          printf 'ASSET_NAME=%s\n' "$asset_name" >> "$GITHUB_ENV"

      - name: Prepare Windows MSI asset
        if: runner.os == 'Windows'
        run: |
          msi_files=(java-frontend/target/windows-installer/*.msi)
          if [ ! -e "${msi_files[0]}" ]; then
            printf 'Expected an MSI in java-frontend/target/windows-installer\n' >&2
            exit 1
          fi
          asset_name="${{ matrix.asset_name }}"
          cp "${msi_files[0]}" "$asset_name"
          printf 'ASSET_NAME=%s\n' "$asset_name" >> "$GITHUB_ENV"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-package

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
          fi

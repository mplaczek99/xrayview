name: Build release artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-desktop-archive:
    name: Build desktop archive (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: xrayview-linux-desktop-archive
            archive_platform: linux
            archive_extension: tar.gz
          - os: windows-latest
            label: Windows
            artifact_name: xrayview-windows-desktop-archive
            archive_platform: windows
            archive_extension: zip

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: |
            desktop/go.sum
            backend/go.sum

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and smoke-test desktop release
        if: runner.os != 'Windows'
        run: npm run release:smoke

      - name: Build Windows desktop release
        if: runner.os == 'Windows'
        run: |
          npm run contracts:check
          npm run wails:build

      - name: Archive desktop payload
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${{ runner.os }}" = "Linux" ]; then
            arch="$(uname -m)"
            payload_dir="$RUNNER_TEMP/xrayview-v${version}-${{ matrix.archive_platform }}-${arch}"
            archive_name="$(basename "$payload_dir").${{ matrix.archive_extension }}"
          else
            payload_dir="$RUNNER_TEMP/xrayview-v${version}-${{ matrix.archive_platform }}-x64"
            archive_name="$(basename "$payload_dir").${{ matrix.archive_extension }}"
          fi

          node ./desktop/scripts/stage-release-payload.mjs --output "$payload_dir"

          if [ "${{ runner.os }}" = "Linux" ]; then
            tar -C "$RUNNER_TEMP" -czf "$RUNNER_TEMP/$archive_name" "$(basename "$payload_dir")"
          else
            tar -a -C "$RUNNER_TEMP" -cf "$RUNNER_TEMP/$archive_name" "$(basename "$payload_dir")"
          fi

          printf 'ARCHIVE_PATH=%s\n' "$RUNNER_TEMP/$archive_name" >> "$GITHUB_ENV"

      - name: Upload desktop archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

name: Build release artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-desktop-archive:
    name: Build desktop archive (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: xrayview-linux-desktop-archive
            archive_platform: linux
            archive_extension: tar.gz
            shell_binary: xrayview
            sidecar_binary: xrayview-go-backend
          - os: windows-latest
            label: Windows
            artifact_name: xrayview-windows-desktop-archive
            archive_platform: windows
            archive_extension: zip
            shell_binary: xrayview.exe
            sidecar_binary: xrayview-go-backend.exe

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.mod

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and smoke-test desktop release
        run: npm run release:smoke

      - name: Archive desktop binaries
        run: |
          version="$(grep -oP '"version":\s*"\K[^"]+' package.json)"
          if [ "${{ runner.os }}" = "Linux" ]; then
            arch="$(uname -m)"
            archive_name="xrayview-v${version}-${{ matrix.archive_platform }}-${arch}.${{ matrix.archive_extension }}"
            tar -C desktop/build/bin -czf "$RUNNER_TEMP/$archive_name" \
              "${{ matrix.shell_binary }}" \
              "${{ matrix.sidecar_binary }}"
          else
            archive_name="xrayview-v${version}-${{ matrix.archive_platform }}-x64.${{ matrix.archive_extension }}"
            tar -a -C desktop/build/bin -cf "$RUNNER_TEMP/$archive_name" \
              "${{ matrix.shell_binary }}" \
              "${{ matrix.sidecar_binary }}"
          fi
          printf 'ARCHIVE_PATH=%s\n' "$RUNNER_TEMP/$archive_name" >> "$GITHUB_ENV"

      - name: Upload desktop archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

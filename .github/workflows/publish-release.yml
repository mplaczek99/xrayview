name: Publish release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-package:
    name: Build release archive (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: xrayview-linux-release-asset
            archive_platform: linux
            archive_extension: tar.gz
            shell_binary: xrayview
            sidecar_binary: xrayview-go-backend
          - os: windows-latest
            label: Windows
            artifact_name: xrayview-windows-release-asset
            archive_platform: windows
            archive_extension: zip
            shell_binary: xrayview.exe
            sidecar_binary: xrayview-go-backend.exe

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.mod

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and smoke-test release archive
        run: npm run release:smoke

      - name: Archive release binaries
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            arch="$(uname -m)"
            archive_name="xrayview-v${version}-${{ matrix.archive_platform }}-${arch}.${{ matrix.archive_extension }}"
            tar -C desktop/build/bin -czf "$RUNNER_TEMP/$archive_name" \
              "${{ matrix.shell_binary }}" \
              "${{ matrix.sidecar_binary }}"
          else
            archive_name="xrayview-v${version}-${{ matrix.archive_platform }}-x64.${{ matrix.archive_extension }}"
            tar -a -C desktop/build/bin -cf "$RUNNER_TEMP/$archive_name" \
              "${{ matrix.shell_binary }}" \
              "${{ matrix.sidecar_binary }}"
          fi
          printf 'ASSET_PATH=%s\n' "$RUNNER_TEMP/$archive_name" >> "$GITHUB_ENV"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          raw_notes="$RUNNER_TEMP/release-notes.raw.md"
          notes_file="$RUNNER_TEMP/release-notes.md"

          awk -v version="$version" '
            BEGIN { target = "## [" version "] - " }
            index($0, target) == 1 { in_section = 1; next }
            in_section && index($0, "## [") == 1 { exit }
            in_section { print }
          ' CHANGELOG.md > "$raw_notes"

          sed '/./,$!d' "$raw_notes" | tac | sed '/./,$!d' | tac > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            printf 'Could not extract release notes for version %s from CHANGELOG.md\n' "$version" >&2
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
